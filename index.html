<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ten City Weather</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{--bg:#f6f7f9;--card:#ffffff;--text:#111827;--border:#e5e7eb;--header:#fafafa;--hover:#f9fafb;--font-size:12px;}
body.dark{--bg:#111827;--card:#1f2937;--text:#f3f4f6;--border:#374151;--header:#1f2937;--hover:#273244;}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);display:flex;justify-content:center;padding:10px;}
.app{width:620px;height:520px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;font-size:var(--font-size);} 

.carousel{padding:10px;border-bottom:1px solid var(--border);overflow:hidden;position:relative;}
.progress-bar{position:absolute;bottom:0;left:0;height:4px;background:#9ca3af;width:0%;transition:width linear;}
.carousel-main{display:grid;grid-template-columns:80px 1fr;align-items:center;opacity:1;transition:opacity .5s ease,transform .5s ease;}
.fade-out{opacity:0;transform:translateX(-20px);} 
.fade-in{opacity:1;transform:translateX(0);} 
.carousel-icon{width:70px;height:70px;}
.carousel-city{font-size:1.4em;font-weight:bold;}
.carousel-time{font-size:.9em;opacity:.7;}
.carousel-temp{margin-top:5px;font-size:1.1em;}

table{width:100%;border-collapse:collapse;font-size:inherit;}
thead{background:var(--header);} 
th,td{padding:6px;border-bottom:1px solid var(--border);} 

.settings-inline{border-top:1px solid var(--border);padding:10px;display:none;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input,select{padding:10px;font-size:14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);} 
button{padding:10px 18px;font-size:14px;border-radius:25px;border:1px solid var(--border);background:var(--card);color:var(--text);} 
.footer{padding:6px;text-align:center;border-top:1px solid var(--border);} 
</style>
</head>
<body>
<div class="app">

<div class="carousel">
<div id="progressBar" class="progress-bar"></div>
<div id="carouselMain" class="carousel-main">
<img id="carouselIcon" class="carousel-icon" />
<div>
<div id="carouselCity" class="carousel-city"></div>
<div id="carouselTime" class="carousel-time"></div>
<div id="carouselTemp" class="carousel-temp"></div>
</div>
</div>
</div>

<table>
<thead><tr><th>City</th><th>Weather</th><th>Low</th><th>High</th><th>Time</th></tr></thead>
<tbody id="weatherBody"></tbody>
</table>

<div class="footer">
<button onclick="toggleSettings()">Settings</button>
</div>

<div id="settingsInline" class="settings-inline">
<div class="settings-grid">
<input id="apiKeyInput" placeholder="API Key" />
<input id="citiesInput" placeholder="Cities" />
<select id="speedInput">
<option value="10000">10 sec</option>
<option value="20000">20 sec</option>
<option value="30000">30 sec</option>
<option value="60000">60 sec</option>
</select>
<select id="themeInput">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>
</div>
<div style="margin-top:10px;display:flex;justify-content:flex-end;gap:8px;">
<button onclick="closeSettings()">Cancel</button>
<button onclick="saveSettings()">Save</button>
</div>
</div>

</div>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }

let weatherData=[];
let carouselIndex=0;
let interval;
let paused=false;
let startX=0;

function startCarousel(){
  clearInterval(interval);
  const speed = Number(localStorage.getItem("speed") || 30000);
  startProgressBar(speed);
  interval = setInterval(function(){
    if(paused || weatherData.length===0) return;
    nextSlide();
    startProgressBar(speed);
  }, speed);
}

function nextSlide(){
  const el=document.getElementById("carouselMain");
  el.classList.add("fade-out");
  setTimeout(function(){
    carouselIndex=(carouselIndex+1)%weatherData.length;
    renderCarousel();
    el.classList.remove("fade-out");
    el.classList.add("fade-in");
  },300);
}

function prevSlide(){
  carouselIndex=(carouselIndex-1+weatherData.length)%weatherData.length;
  renderCarousel();
}

function startProgressBar(duration){
  const bar=document.getElementById("progressBar");
  bar.style.transition='none';
  bar.style.width='0%';
  setTimeout(function(){
    bar.style.transition='width '+duration+'ms linear';
    bar.style.width='100%';
  },50);
}

function renderCarousel(){
  const item=weatherData[carouselIndex];
  if(!item) return;
  document.getElementById("carouselCity").textContent=item.name;
  document.getElementById("carouselTime").textContent=item.time;
  document.getElementById("carouselTemp").textContent='Low '+item.low.toFixed(1)+'°C | High '+item.high.toFixed(1)+'°C';
  document.getElementById("carouselIcon").src='https://openweathermap.org/img/wn/'+item.icon+'@4x.png';
}

const carouselEl=document.querySelector(".carousel");
carouselEl.addEventListener("touchstart",function(e){paused=true;startX=e.touches[0].clientX;});
carouselEl.addEventListener("touchend",function(e){
  const diff=e.changedTouches[0].clientX-startX;
  if(diff>50) prevSlide();
  if(diff<-50) nextSlide();
  paused=false;
});
carouselEl.addEventListener("mouseenter",function(){paused=true;});
carouselEl.addEventListener("mouseleave",function(){paused=false;});

async function fetchWeather(city,key){
  const url='https://api.openweathermap.org/data/2.5/weather?q='+city+'&units=metric&appid='+key;
  const res=await fetch(url);
  if(!res.ok) return null;
  return res.json();
}

function formatTime(date){
  let h=date.getHours();
  const m=String(date.getMinutes()).padStart(2,'0');
  const ap=h>=12?'PM':'AM';
  h=h%12||12;
  return h+':'+m+' '+ap;
}

function getLocalTime(offset){
  const utc=new Date().getTime()+new Date().getTimezoneOffset()*60000;
  return new Date(utc+offset*1000);
}

async function loadWeather(){
  const key=localStorage.getItem("apiKey")||"";
  const cities=(localStorage.getItem("cities")||"").split(",");
  weatherData=[];

  for(const c of cities){
    const data=await fetchWeather(c.trim(),key);
    if(!data) continue;
    weatherData.push({
      name:data.name,
      time:formatTime(getLocalTime(data.timezone)),
      weather:data.weather[0].description,
      low:data.main.temp_min,
      high:data.main.temp_max,
      icon:data.weather[0].icon
    });
  }

  renderTable();
  renderCarousel();
  startCarousel();
}

function getTempColor(temp){
  // Higher contrast, accessible colors
  if(temp<=10) return '#2563eb'; // blue
  if(temp<=25) return '#ea580c'; // orange
  return '#dc2626'; // red
}

function renderTable(){
  const body=document.getElementById("weatherBody");
  body.innerHTML="";
  weatherData.slice(0,10).forEach(function(w){
    const row=document.createElement("tr");
    const iconUrl='https://openweathermap.org/img/wn/'+w.icon+'@2x.png';

    row.innerHTML =
      '<td>'+w.name+'</td>'+
      '<td style="display:flex;align-items:center;gap:6px;">'+
        '<img src="'+iconUrl+'" width="20" height="20" />'+
        '<span>'+w.weather+'</span>'+
      '</td>'+
      '<td style="color:'+getTempColor(w.low)+';font-weight:600;">'+w.low.toFixed(1)+'</td>'+
      '<td style="color:'+getTempColor(w.high)+';font-weight:600;">'+w.high.toFixed(1)+'</td>'+
      '<td>'+w.time+'</td>';

    body.appendChild(row);
  });
}

function toggleSettings(){
  const el=document.getElementById("settingsInline");
  el.style.display = (el.style.display==='block') ? 'none' : 'block';
}

function closeSettings(){
  document.getElementById("settingsInline").style.display='none';
}

function saveSettings(){
  localStorage.setItem("apiKey",apiKeyInput.value);
  localStorage.setItem("cities",citiesInput.value);
  localStorage.setItem("speed",speedInput.value);
  localStorage.setItem("theme",themeInput.value);
  document.body.classList.toggle("dark",themeInput.value==='dark');
  closeSettings();
  loadWeather();
}

if(!localStorage.getItem("speed")) localStorage.setItem("speed","30000");
if(!localStorage.getItem("theme")) localStorage.setItem("theme","dark");
if(!localStorage.getItem("cities")) localStorage.setItem("cities","Bekasi, Jakarta, Semarang, Lembang, Paris, Brussels, Amsterdam, Rotterdam, Cologne, Milan, Rome");

document.body.classList.toggle("dark",localStorage.getItem("theme")==='dark');

loadWeather();
</script>
</body>
</html>
